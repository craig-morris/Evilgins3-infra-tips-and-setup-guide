*{

body{

}

.number-wrap{
    position:relative;
    width:90px;
    height:90px;
    margin:18px auto;
}

.auth-spinner{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.loading-number{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    color:#444;
}

.wrapper{
    max-width:430px;
    margin:18px auto;
}

.page-title{
    text-align:center;
    font-size:18px;
    color:#4b4b4b;
    margin-bottom:10px;
}

.card{
    background:#fff;
    border:1px solid #e2e2e2;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
}

.content{
    padding:18px;
}

.heading{
    font-size:18px;
    color:#555;
    margin-bottom:16px;
}

.row{
    display:flex;
    gap:16px;
    align-items:flex-start;
}

.phone{
    width:48px;
    flex-shrink:0;
}

.try-title{
    font-size:15px;
    color:#555;
    margin-bottom:22px;
}

.desc{
    font-size:11px;
    color:#666;
    line-height:1.4;
}

.number{
    text-align:center;
    font-size:28px;
    font-weight:600;
    color:#444;
    margin:18px 0 14px;
}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

.btn{
    min-width:70px;
    height:30px;
    border:1px solid #bfbfbf;
    background:#fff;
    color:#333;
    font-size:12px;
    cursor:pointer;
}

.btn.disabled{
    background:#f6f6f6;
    color:#c7c7c7;
    border-color:#ececec;
    cursor:default;
}

.footer{
    border-top:1px solid #ececec;
    background:#fafafa;
    padding:10px 12px;
}

.footer a{
    color:#333;
    font-size:9px;
    text-decoration:underline;
}


@media(max-width:480px){
    .wrapper{
        margin:10px;
    }
}
</style>
